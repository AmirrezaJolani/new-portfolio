name: Docker

on:
  pull_request:
  push:
    branches: [main]

# Only the newest run per ref may proceed, so rapid `main` pushes can't leave
# `latest` pointing at an older commit (older publish runs are cancelled).
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  # Build + smoke-test the image on every PR and push. Least-privilege:
  # read-only token, never logs in or pushes.
  docker-build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: portfolio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the image
        run: |
          docker run -d --name portfolio-ci -p 3000:3000 portfolio:ci
          for _ in $(seq 1 20); do
            curl -fsS http://localhost:3000/ >/dev/null 2>&1 && break
            sleep 2
          done
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          echo "GET / -> $code"
          test "$code" = "200"
          echo "fa locale marker:"
          curl -s -b "NEXT_LOCALE=fa" http://localhost:3000/ | grep -o 'dir="rtl"' | head -1 || echo "(rtl marker not found)"
          user=$(docker exec portfolio-ci whoami)
          echo "runtime user -> $user"
          test "$user" = "nextjs"
          docker rm -f portfolio-ci

  # Publish only from main. This is the only job granted packages: write.
  docker-publish:
    needs: docker-build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
